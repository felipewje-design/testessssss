<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Aeterna</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #0c0d12 0%, #050508 100%);
            --card-glass: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.06);
            --aeterna-gold: #e5c158;
            --gold-gradient: linear-gradient(135deg, #f3c63f 0%, #b88728 100%);
            --gold-glow: rgba(229, 193, 88, 0.12);
            --text-gray: #94a3b8;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            outline: none !important; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: var(--bg-gradient); 
            color: #f8fafc; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 25px 20px; 
            position: relative;
            overflow-x: hidden;
        }

        /* Orbes de fundo premium */
        .glowing-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            z-index: 1;
            opacity: 0.05;
            pointer-events: none;
        }
        .orb-1 { top: -10%; left: -10%; width: 450px; height: 450px; background: var(--aeterna-gold); }
        .orb-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: #b88728; }
        
        .reg-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 410px;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .reg-container { 
            background: var(--card-glass); 
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            padding: 40px 32px; 
            border-radius: 28px; 
            border: 1px solid var(--card-border); 
            text-align: center; 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255,255,255,0.03);
        }
        
        .logo-box { margin-bottom: 30px; }
        .logo { 
            font-size: 2.3rem; 
            font-weight: 800; 
            color: white; 
            letter-spacing: -1.5px; 
        }
        .logo span { 
            color: var(--aeterna-gold); 
            text-shadow: 0 0 25px rgba(229, 193, 88, 0.3); 
        }
        .subtitle { 
            color: var(--text-gray); 
            font-size: 0.85rem; 
            margin-top: 10px; 
            font-weight: 400;
        }

        .input-group { 
            margin-bottom: 18px; 
            text-align: left; 
            position: relative; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.72rem; 
            color: var(--text-gray); 
            padding-left: 2px; 
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        input { 
            width: 100%; 
            padding: 16px 20px; 
            background: rgba(0, 0, 0, 0.25); 
            border: 1px solid var(--card-border); 
            border-radius: 14px; 
            color: white; 
            font-size: 0.95rem; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input::placeholder { color: #4b5563; }

        input:focus { 
            border-color: var(--aeterna-gold); 
            background: rgba(0, 0, 0, 0.4); 
            box-shadow: 0 0 12px var(--gold-glow);
        }

        /* Padding especial para o input que tem o ícone do olho */
        .input-password {
            padding-right: 55px;
        }

        .input-group i.input-icon {
            position: absolute;
            right: 22px;
            bottom: 16px;
            color: #4b5563;
            font-size: 1.05rem;
            transition: color 0.3s;
        }
        .input-group i.btn-toggle-password {
            cursor: pointer;
            pointer-events: auto;
        }
        .input-group i.btn-toggle-password:hover {
            color: #94a3b8;
        }
        input:focus ~ i.input-icon {
            color: var(--aeterna-gold);
        }

        .btn-reg { 
            width: 100%; 
            padding: 18px; 
            border-radius: 16px; 
            border: none; 
            background: var(--gold-gradient); 
            color: #000; 
            font-weight: 800; 
            font-size: 0.95rem; 
            cursor: pointer; 
            margin-top: 15px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.2s; 
            box-shadow: 0 6px 20px var(--gold-glow);
        }
        .btn-reg:active { transform: scale(0.97); }
        .btn-reg:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

        .footer-link { 
            text-align: center; 
            margin-top: 28px; 
            font-size: 0.82rem; 
            color: #64748b;
        }
        .footer-link a { 
            color: white; 
            text-decoration: none; 
            font-weight: 600; 
            border-bottom: 1px dashed var(--aeterna-gold);
            padding-bottom: 2px;
            transition: 0.2s;
        }
        .footer-link a:hover {
            color: var(--aeterna-gold);
            border-bottom-style: solid;
        }
    </style>
</head>
<body>

    <div class="glowing-orb orb-1"></div>
    <div class="glowing-orb orb-2"></div>

    <div class="reg-wrapper">
        <div class="reg-container">
            <div class="logo-box">
                <div class="logo"><span>Aet</span>erna</div>
                <p class="subtitle">Cadastre-se para começar a gerenciar seus ativos</p>
            </div>
            
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" id="reg-nome" placeholder="Seu nome completo">
            </div>

            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="reg-email" placeholder="seu@email.com">
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="reg-senha" class="input-password" placeholder="Mínimo 6 caracteres">
                <i class="fas fa-eye-slash input-icon btn-toggle-password" id="togglePassword"></i>
            </div>

            <div class="input-group">
                <label>Código de Convite (Opcional)</label>
                <input type="text" id="reg-invite" placeholder="Código do indicador">
            </div>

            <button class="btn-reg" id="btnRegistrar">CADASTRAR AGORA</button>

            <div class="footer-link">
                Já tem uma conta? <a href="index.html">Fazer Login</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, increment, getDoc, collection, addDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKDFw7khZzM9hIX7xbbrbFQeESiCLnmOw",
            authDomain: "monety-site-9175f.firebaseapp.com",
            projectId: "monety-site-9175f",
            storageBucket: "monety-site-9175f.firebasestorage.app",
            messagingSenderId: "840821848803",
            appId: "1:840821848803:web:b99a5528e4bb925518a3d6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Lógica de alternar visibilidade da senha (Olho)
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('reg-senha');

        togglePassword.addEventListener('click', function () {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            this.classList.toggle('fa-eye-slash', !isPassword);
            this.classList.toggle('fa-eye', isPassword);
        });

        // Carregamento inteligente e preenchimento do código de convite
        const urlParams = new URLSearchParams(window.location.search);
        let indicadoPor = urlParams.get('ref') || localStorage.getItem('padrinho') || '';
        
        if (indicadoPor) {
            localStorage.setItem('padrinho', indicadoPor);
            document.getElementById('reg-invite').value = indicadoPor;
        }

        document.getElementById('btnRegistrar').addEventListener('click', async () => {
            const nome = document.getElementById('reg-nome').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const senha = document.getElementById('reg-senha').value;
            const inviteInputCode = document.getElementById('reg-invite').value.trim();
            const btn = document.getElementById('btnRegistrar');

            if (!nome || !email || senha.length < 6) {
                return Swal.fire({
                    icon: 'warning',
                    title: 'Dados Incompletos',
                    text: 'Preencha todos os campos corretamente.',
                    background: '#0c0d12',
                    color: '#fff',
                    confirmButtonColor: '#e5c158'
                });
            }

            btn.disabled = true;
            Swal.fire({
                title: 'Criando sua conta...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); },
                background: '#0c0d12',
                color: '#fff'
            });

            try {
                let saldoInicial = 0;
                try {
                    const bonusSnap = await getDoc(doc(db, "configuracoes", "bonus_cadastro"));
                    if (bonusSnap.exists()) {
                        saldoInicial = Number(bonusSnap.data().valor) || 0;
                    }
                } catch (e) { console.error("Erro ao buscar bônus:", e); }

                const userCredential = await createUserWithEmailAndPassword(auth, email, senha);
                const user = userCredential.user;

                // Define o indicador com base no valor real digitado ou capturado no input
                let paiId = inviteInputCode || null;
                let avoId = null;
                let bisavoId = null;

                if (paiId) {
                    try {
                        const paiSnap = await getDoc(doc(db, "usuarios", paiId));
                        if (paiSnap.exists()) {
                            const paiData = paiSnap.data();
                            
                            avoId = paiData.indicadoPor || null;
                            bisavoId = paiData.indicadoPorAvo || null;

                            await updateDoc(doc(db, "usuarios", paiId), {
                                indicadosCount: increment(1)
                            });

                            if (avoId) {
                                await updateDoc(doc(db, "usuarios", avoId), {
                                    indicadosL2Count: increment(1)
                                });
                            }

                            if (bisavoId) {
                                await updateDoc(doc(db, "usuarios", bisavoId), {
                                    indicadosL3Count: increment(1)
                                });
                            }
                        }
                    } catch (e) { console.error("Erro na linhagem de comissões/indicação:", e); }
                }

                await setDoc(doc(db, "usuarios", user.uid), {
                    nome: nome, 
                    email: email, 
                    saldo: saldoInicial, 
                    saldoLucro: 0,      
                    totalGanhos: 0, 
                    totalComissoes: 0, 
                    giros: 1, 
                    indicadosCount: 0,   
                    indicadosL2Count: 0, 
                    indicadosL3Count: 0, 
                    indicadoPor: paiId,        
                    indicadoPorAvo: avoId,     
                    indicadoPorBisavo: bisavoId, 
                    uid: user.uid, 
                    status: "ativo", 
                    dataCriacao: new Date().toISOString() 
                });

                if (saldoInicial > 0) {
                    await addDoc(collection(db, "historico"), {
                        userId: user.uid,
                        valor: saldoInicial,
                        tipo: 'Bônus',
                        descricao: 'Presente de Boas-Vindas',
                        data: Timestamp.now()
                    });
                }

                localStorage.removeItem('padrinho');

                await Swal.fire({
                    icon: 'success',
                    title: 'Conta Criada!',
                    text: saldoInicial > 0 ? `Você ganhou R$ ${saldoInicial.toFixed(2)} de bônus!` : 'Seja bem-vindo!',
                    background: '#0c0d12',
                    color: '#fff',
                    showConfirmButton: false,
                    timer: 2000
                });

                window.location.href = "home.html";

            } catch (error) {
                btn.disabled = false;
                let msg = "Erro ao criar conta.";
                if (error.code === 'auth/email-already-in-use') msg = "E-mail já cadastrado.";
                
                Swal.fire({
                    icon: 'error',
                    title: 'Erro',
                    text: msg,
                    background: '#0c0d12',
                    color: '#fff',
                    confirmButtonColor: '#e5c158'
                });
            }
        });
    </script>
</body>
</html>
