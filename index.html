<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aeterna</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #0c0d12 0%, #050508 100%);
            --card-glass: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.06);
            --aeterna-gold: #e5c158;
            --gold-gradient: linear-gradient(135deg, #f3c63f 0%, #b88728 100%);
            --gold-glow: rgba(229, 193, 88, 0.12);
            --text-gray: #94a3b8;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            outline: none !important; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
            color: #f8fafc;
        }

        /* Orbes de Luz Ouro de Alta Performance */
        .glowing-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            z-index: 1;
            opacity: 0.06;
            pointer-events: none;
        }
        .orb-1 { top: -10%; left: -10%; width: 450px; height: 450px; background: var(--aeterna-gold); }
        .orb-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: #b88728; }

        .login-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 410px;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: var(--card-glass);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            padding: 45px 32px;
            border-radius: 28px;
            border: 1px solid var(--card-border);
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255,255,255,0.03);
        }

        .logo-box {
            margin-bottom: 35px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            letter-spacing: -1.5px;
            display: inline-block;
        }
        .logo span { 
            color: var(--aeterna-gold); 
            text-shadow: 0 0 25px rgba(229, 193, 88, 0.3); 
        }
        
        .login-card p { 
            color: var(--text-gray); 
            font-size: 0.85rem; 
            margin-top: 12px;
            line-height: 1.5;
            font-weight: 400;
        }

        .input-container {
            margin-bottom: 20px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 18px 55px 18px 22px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input::placeholder { color: #4b5563; }

        input:focus { 
            border-color: var(--aeterna-gold); 
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        .input-container i.input-icon {
            position: absolute;
            right: 22px;
            top: 50%;
            transform: translateY(-50%);
            color: #4b5563;
            font-size: 1.05rem;
            transition: color 0.3s;
        }

        /* Ícone interativo do Olho para ver senha */
        .input-container i.btn-toggle-password {
            cursor: pointer;
            pointer-events: auto;
        }
        .input-container i.btn-toggle-password:hover {
            color: #94a3b8;
        }
        
        input:focus ~ i.input-icon {
            color: var(--aeterna-gold);
        }

        /* Botão de Ação Premium */
        .btn-modern-submit {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            background: var(--gold-gradient);
            color: #000;
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
            box-shadow: 0 6px 20px var(--gold-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .btn-modern-submit:hover {
            opacity: 0.95;
            box-shadow: 0 8px 25px rgba(229, 193, 88, 0.25);
        }
        .btn-modern-submit:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
        .btn-modern-submit:active { transform: scale(0.97); }

        .footer-action { 
            margin-top: 32px; 
            font-size: 0.82rem; 
            color: #64748b;
        }
        .footer-action a { 
            color: white; 
            text-decoration: none; 
            font-weight: 600;
            border-bottom: 1px dashed var(--aeterna-gold);
            padding-bottom: 2px;
            transition: 0.2s;
        }
        .footer-action a:hover { 
            color: var(--aeterna-gold);
            border-bottom-style: solid;
        }
    </style>
</head>
<body>

    <div class="glowing-orb orb-1"></div>
    <div class="glowing-orb orb-2"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-box">
                <div class="logo"><span>Aet</span>erna</div>
                <p>Entre na sua central de alta performance e gerenciamento de ativos</p>
            </div>

            <div class="input-container">
                <input type="email" id="email" placeholder="Endereço de e-mail">
                <i class="fas fa-envelope input-icon"></i>
            </div>

            <div class="input-container">
                <input type="password" id="password" placeholder="Senha de acesso">
                <i class="fas fa-eye-slash input-icon btn-toggle-password" id="togglePassword"></i>
            </div>

            <button class="btn-modern-submit" id="btnLogin">
                <span>CONECTAR MINHA CONTA</span>
                <i class="fas fa-arrow-right" style="font-size: 0.85rem;"></i>
            </button>

            <div class="footer-action">
                Novo por aqui? <a href="registro.html">Criar credenciais</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKDFw7khZzM9hIX7xbbrbFQeESiCLnmOw",
            authDomain: "monety-site-9175f.firebaseapp.com",
            projectId: "monety-site-9175f",
            storageBucket: "monety-site-9175f.firebasestorage.app",
            messagingSenderId: "840821848803",
            appId: "1:840821848803:web:b99a5528e4bb925518a3d6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Sistema dinâmico para alternar visibilidade da senha (Olho)
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            
            // Alterna as classes do FontAwesome dinamicamente
            this.classList.toggle('fa-eye-slash', !isPassword);
            this.classList.toggle('fa-eye', isPassword);
        });

        document.getElementById('btnLogin').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');

            if(!email || !password) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Dados incompletos',
                    text: 'Preencha seu e-mail e senha.',
                    background: '#0c0d12',
                    color: '#fff',
                    confirmButtonColor: '#e5c158'
                });
                return;
            }

            btn.disabled = true;
            Swal.fire({
                title: 'Autenticando...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); },
                background: '#0c0d12',
                color: '#fff'
            });

            try {
                await signInWithEmailAndPassword(auth, email, password);
                
                Swal.fire({
                    icon: 'success',
                    title: 'Acesso autorizado!',
                    showConfirmButton: false,
                    timer: 1200,
                    background: '#0c0d12',
                    color: '#fff'
                });

                setTimeout(() => {
                    window.location.href = "home.html";
                }, 1200);

            } catch (error) {
                btn.disabled = false;
                let mensagem = "Verifique seus dados e tente novamente.";
                
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    mensagem = "E-mail ou senha inválidos.";
                } else if (error.code === 'auth/too-many-requests') {
                    mensagem = "Muitas tentativas. Tente mais tarde.";
                }

                Swal.fire({
                    icon: 'error',
                    title: 'Falha no acesso',
                    text: mensagem,
                    background: '#0c0d12',
                    color: '#fff',
                    confirmButtonColor: '#e5c158'
                });
            }
        });
    </script>
</body>
</html>
